- id: 1
  spot: Okuma Town
  slug: okuma
  image: /assets/images/authors/okuma-imamura-post/01.jpg
  summary: "Field note on Okuma Town's reconstruction base, phased recovery, everyday recovery facilities, and disaster public housing."
  subpages:
  - author: Keita Imamura
    attribute: Doctoral Program, 1st Year
    slug: okuma-imamura-post
    url: /notes/okuma-imamura-post/
  discussion_points:
  - How does the Okawara Reconstruction District serve as a core for rebuilding daily life through town hall, commerce, housing, and education?
  - What effects have phased lifting of evacuation orders and hub development had on return and everyday recovery?
