<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main">本文へ移動</a>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Behavior in Networks Studies Unit" width="40" height="40">
          <span>{{ site.title }}</span>
        </a>
        <nav class="site-nav" aria-label="主要ナビゲーション">
          <a href="{{ '/' | relative_url }}#gallery">ギャラリー</a>
          <a href="{{ '/' | relative_url }}#route">行程</a>
          <a href="{{ '/' | relative_url }}#notes">訪問先</a>
          <a href="{{ '/guidelines/' | relative_url }}">公開方針</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <div class="site-footer__brand">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Behavior in Networks Studies Unit" width="32" height="32" loading="lazy">
          <span>Behavior in Networks Studies Unit</span>
        </div>
        <p>© {{ site.time | date: '%Y' }} {{ site.organization | default: site.title }}. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
