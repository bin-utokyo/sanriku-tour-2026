<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main">本文へ移動</a>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="主要ナビゲーション">
          <a href="{{ '/' | relative_url }}#spots">スポット一覧</a>
          <a href="{{ '/' | relative_url }}#authors">執筆者別</a>
          <a href="{{ '/guidelines/' | relative_url }}">執筆・公開ガイド</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p>© {{ site.time | date: '%Y' }} 東北研修</p>
        <p>公開前に個人情報・引用・画像権利・現地関係者の了承範囲を確認してください。</p>
      </div>
    </footer>
  </body>
</html>
